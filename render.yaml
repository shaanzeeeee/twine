# Render Blueprint — Twine Backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: twine-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PERSONA_NAME
        sync: false
      - key: PERSONA_DESCRIPTION
        sync: false
      - key: PERSONA_INSTRUCTIONS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CHROMA_DB_DIR
        value: ./chroma_data
      - key: PYTHONPATH
        value: .
